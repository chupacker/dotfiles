#================================
# Backend & Performance
#================================
backend = "glx";
vsync = true;
use-damage = true;

#================================
# Blur (Optimized for Performance)
#================================
blur-method = "dual_kawase";
blur-strength = 3;  # 1-10
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@",
    "class_g = 'Polybar'",
    "class_g = 'Eww'",
    "class_g = 'eww'",
    "class_g = 'slop'",
    "class_g = 'firefox' && argb",
    "class_g = 'chromium' && argb",
];

#================================
# Rounded Corners
#================================
corner-radius = 0;
detect-rounded-corners = true;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'Eww'",
    "class_g = 'eww'",
    "class_g = 'Dunst'",
    "class_g = 'Rofi'",
];

#================================
# Opacity
#================================
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
    "90:class_g = 'Dunst'",
    "92:class_g = 'Pcmanfm'",
    "92:class_g = 'Thunar'",
    "92:class_g = 'dolphin'",
];

#================================
# Fading
#================================
fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 8;
no-fading-openclose = false;

#================================
# Shadows
#================================
shadow-exclude = [
    "class_g = 'Eww'",
    "class_g = 'Polybar'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
];

#================================
# Animations (Picom v12+)
#================================
animations = (
  {
    triggers = ["open", "show"];
    preset = "appear";
    scale = 0.95;  
    duration = 0.15;  
  },
  {
    triggers = ["close", "hide"];
    preset = "disappear";
    scale = 0.95;
    duration = 0.15;
  },
  {
    triggers = ["geometry"];
    preset = "geometry-change";
    duration = 0.2;
  }
)

# Workspace - simple sliding
animation-for-workspace-switch-in = "slide-right";
animation-for-workspace-switch-out = "slide-left";

#================================
# Window Type Settings
#================================
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.95; focus = true; full-shadow = false; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; shadow = true; };
};
